[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --cov=app --cov-report=term-missing --cov-fail-under=80"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
omit = [
    "app/jobs/*",
    "app/providers/football_data_provider.py",
    "app/providers/api_football_provider.py",
    "app/providers/worldcup_api_provider.py",
    "alembic/*",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "B"]
ignore = ["B008"]
